<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tap Attack Game</title>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --yellow: #FFE600;
            --red: #FF2D2D;
            --dark: #0f0f0f;
            --panel: #1c1c1c;
            --border: #333;
            --accent: #00e5ff;
        }
        *, *::before, *::after { box-sizing: border-box; }
        body {
            margin: 0; padding: 0;
            background-color: var(--dark);
            background-image:
                radial-gradient(ellipse at 20% 20%, rgba(255,230,0,0.06) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 80%, rgba(255,45,45,0.06) 0%, transparent 60%),
                repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(255,255,255,0.02) 39px, rgba(255,255,255,0.02) 40px),
                repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(255,255,255,0.02) 39px, rgba(255,255,255,0.02) 40px);
            color: white;
            font-family: 'Nunito', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }
        #ui-container { text-align: center; margin-bottom: 18px; z-index: 10; }
        h1 {
            font-family: 'Bangers', cursive;
            font-size: clamp(2.4rem, 8vw, 3.5rem);
            letter-spacing: 0.06em;
            margin: 0 0 2px 0;
            color: var(--yellow);
            text-shadow: 4px 4px 0 var(--red), 8px 8px 0 rgba(255,45,45,0.3);
            line-height: 1;
        }
        #score-board {
            display: inline-flex; align-items: center; gap: 10px;
            background: var(--panel); border: 2px solid var(--border);
            border-radius: 999px; padding: 6px 22px;
            font-size: 1.1rem; font-weight: 700; color: #aaa; margin-top: 6px;
        }
        #score-board .label { text-transform: uppercase; letter-spacing: 0.12em; font-size: 0.75rem; }
        #score {
            font-family: 'Bangers', cursive; font-size: 2rem;
            letter-spacing: 0.05em; color: var(--yellow);
            min-width: 2ch; display: inline-block; transition: transform 0.08s ease;
        }
        #score.bump { transform: scale(1.4); }
        #streak-badge {
            margin-top: 8px; height: 24px;
            font-family: 'Bangers', cursive; font-size: 1.1rem;
            letter-spacing: 0.1em; color: var(--accent);
            text-shadow: 0 0 12px var(--accent); opacity: 0; transition: opacity 0.2s;
        }
        #streak-badge.visible { opacity: 1; }

        #game-container {
            position: relative;
            width: min(90vw, 400px);
            height: min(62vh, 520px);
            background: var(--panel);
            border: 3px solid var(--border);
            border-radius: 18px;
            box-shadow: 0 0 0 1px rgba(255,255,255,0.04), 0 16px 40px rgba(0,0,0,0.8);
            overflow: hidden;
            cursor: crosshair;
        }
        #game-container::after {
            content: '';
            position: absolute; inset: 0; border-radius: 15px;
            background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.55) 100%);
            pointer-events: none; z-index: 3;
        }

        /* Static full character image */
        #body-img {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: contain;
            object-position: center top;
            pointer-events: none;
            z-index: 1;
        }

        /* Head overlay — positioned to match exactly where his head sits on the body image */
        #head-img {
            position: absolute;
            left: 0;
            top: 25.8333%;
            width: 100%;
            height: 13.3333%;
            object-fit: contain;
            object-position: center top;
            pointer-events: none;
            z-index: 2;
            /* Pivot at the neck (bottom-center of this element) */
            transform-origin: 50% 100%;
        }

        /* Body jolt */
        @keyframes bodyJolt {
            0%   { transform: translate(0,0); }
            20%  { transform: translate(3px,-2px); }
            40%  { transform: translate(-3px,2px); }
            60%  { transform: translate(2px,-1px); }
            80%  { transform: translate(-1px,1px); }
            100% { transform: translate(0,0); }
        }
        #body-img.jolt { animation: bodyJolt 0.25s ease-in-out forwards; }

        /* Head bobble */
        @keyframes headBobble {
            0%   { transform: rotate(0deg) scale(1); }
            12%  { transform: rotate(-14deg) scale(1.06); }
            28%  { transform: rotate(12deg) scale(1.03); }
            44%  { transform: rotate(-8deg) scale(1.02); }
            60%  { transform: rotate(5deg); }
            75%  { transform: rotate(-3deg); }
            88%  { transform: rotate(1.5deg); }
            100% { transform: rotate(0deg) scale(1); }
        }
        #head-img.bobble { animation: headBobble 0.5s cubic-bezier(0.36,0.07,0.19,0.97) forwards; }

        /* Flash */
        #flash-overlay {
            position: absolute; inset: 0;
            background: rgba(255,255,255,0);
            pointer-events: none; z-index: 4; border-radius: 15px;
            transition: background 0.05s;
        }
        #flash-overlay.flash { background: rgba(255,255,255,0.18); }

        .hit-text {
            position: absolute;
            font-family: 'Bangers', cursive;
            letter-spacing: 0.08em;
            pointer-events: none; z-index: 6;
            animation: floatUp 0.45s cubic-bezier(0.22,1,0.36,1) forwards;
            text-shadow: 2px 2px 0 rgba(0,0,0,0.5);
        }
        @keyframes floatUp {
            0%   { opacity: 1; transform: translateY(0) scale(0.8); }
            20%  { transform: translateY(-10px) scale(1.2); }
            100% { opacity: 0; transform: translateY(-70px) scale(0.9); }
        }

        #bottom-bar { margin-top: 16px; display: flex; gap: 12px; }
        .btn {
            font-family: 'Bangers', cursive; font-size: 1.1rem; letter-spacing: 0.1em;
            padding: 8px 24px; border-radius: 999px;
            border: 2px solid var(--border); background: var(--panel);
            color: #aaa; cursor: pointer; transition: all 0.15s;
        }
        .btn:hover, .btn:active { background: var(--border); color: var(--yellow); border-color: var(--yellow); }
    </style>
</head>

        <span id="score">0</span>
    </div>
    <div id="streak-badge" aria-live="polite"></div>
</div>

<div id="bottom-bar">
    <button class="btn" id="reset-btn">&#8635; Reset</button>
</div>

<script>
    const HIT_WORDS  = ['POW!','BAM!','ZAP!','WHAM!','KO!','OOF!','THWACK!','SMASH!'];
    const HIT_COLORS = ['#FF2D2D','#FFE600','#FF8C00','#00e5ff','#ff5fff'];
    let score = 0, streak = 0, streakTimer = null;
    const STREAK_RESET_MS = 1200;

    const scoreDisplay = document.getElementById('score');
    const gameContainer = document.getElementById('game-container');
    const bodyImg      = document.getElementById('body-img');
    const headImg      = document.getElementById('head-img');
    const flashOverlay = document.getElementById('flash-overlay');
    const streakBadge  = document.getElementById('streak-badge');
    const resetBtn     = document.getElementById('reset-btn');

    function handleHit(e) {
        e.preventDefault();
        score++; streak++;

        scoreDisplay.textContent = score;
        scoreDisplay.classList.remove('bump');
        void scoreDisplay.offsetWidth;
        scoreDisplay.classList.add('bump');
        setTimeout(() => scoreDisplay.classList.remove('bump'), 120);

        clearTimeout(streakTimer);
        if (streak >= 3) {
            streakBadge.textContent = streak + 'x COMBO!';
            streakBadge.classList.add('visible');
        } else {
            streakBadge.classList.remove('visible');
        }
        streakTimer = setTimeout(() => { streak = 0; streakBadge.classList.remove('visible'); }, STREAK_RESET_MS);

        headImg.classList.remove('bobble');
        void headImg.offsetWidth;
        headImg.classList.add('bobble');
        setTimeout(() => headImg.classList.remove('bobble'), 520);

        bodyImg.classList.remove('jolt');
        void bodyImg.offsetWidth;
        bodyImg.classList.add('jolt');
        setTimeout(() => bodyImg.classList.remove('jolt'), 260);

        flashOverlay.classList.add('flash');
        setTimeout(() => flashOverlay.classList.remove('flash'), 80);

        let x, y;
        if (e.touches && e.touches.length > 0) {
            const rect = gameContainer.getBoundingClientRect();
            x = e.touches[0].clientX - rect.left;
            y = e.touches[0].clientY - rect.top;
        } else {
            const rect = gameContainer.getBoundingClientRect();
            x = e.clientX - rect.left;
            y = e.clientY - rect.top;
        }
        createHitText(x, y);
    }

    function createHitText(x, y) {
        const el = document.createElement('div');
        el.classList.add('hit-text');
        const word  = streak >= 5
            ? ['ULTRA!!','GODLIKE!','INSANE!'][Math.floor(Math.random()*3)]
            : HIT_WORDS[Math.floor(Math.random()*HIT_WORDS.length)];
        const color = HIT_COLORS[Math.floor(Math.random()*HIT_COLORS.length)];
        const size  = streak >= 5 ? '2.8rem' : streak >= 3 ? '2.2rem' : '1.8rem';
        el.textContent = word;
        el.style.color = color;
        el.style.fontSize = size;
        el.style.left = (x-40)+'px';
        el.style.top  = (y-30)+'px';
        gameContainer.appendChild(el);
        setTimeout(() => el.remove(), 450);
    }

    resetBtn.addEventListener('click', () => {
        score = 0; streak = 0;
        scoreDisplay.textContent = '0';
        streakBadge.classList.remove('visible');
    });

    gameContainer.addEventListener('mousedown', (e) => {
        if (e.pointerType === 'touch') return;
        handleHit(e);
    });
    gameContainer.addEventListener('touchstart', (e) => { handleHit(e); }, { passive: false });
</script>
